<!DOCTYPE html>
<!-- Violation: <html> element is missing the lang attribute — axe rule: html-has-lang, WCAG 3.1.1 -->
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Language Attribute Test — wcag-auditor fixture</title>
</head>
<body>
  <main>
    <h1>Page Without Language Declaration</h1>
    <p>
      This page is intentionally missing the lang attribute on the html element.
      Screen readers use the lang attribute to determine which language engine
      to use for text-to-speech synthesis.
    </p>
  </main>
</body>
</html>
