<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missing Button Text Test — wcag-auditor fixture</title>
</head>
<body>
  <main>
    <h1>Button and Link Accessibility Test</h1>

    <!-- Violation 1: Empty button — no text content and no aria-label — axe rule: button-name, WCAG 4.1.2 -->
    <button></button>

    <!-- Violation 2: Icon-only button — SVG icon with no accessible name — axe rule: button-name, WCAG 4.1.2 -->
    <button>
      <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16">
        <circle cx="8" cy="8" r="6"/>
      </svg>
    </button>

    <!-- Violation 3: Link with only an image, image has no alt — axe rules: link-name + image-alt, WCAG 4.1.2 + 1.1.1 -->
    <a href="/home">
      <img src="home-icon.png">
    </a>

    <!-- Valid button for contrast -->
    <button type="button" aria-label="Close dialog">
      <svg aria-hidden="true" width="16" height="16" viewBox="0 0 16 16">
        <line x1="2" y1="2" x2="14" y2="14"/>
        <line x1="14" y1="2" x2="2" y2="14"/>
      </svg>
    </button>
  </main>
</body>
</html>
