<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Missing Form Labels Test — wcag-auditor fixture</title>
</head>
<body>
  <main>
    <h1>Contact Form</h1>
    <form action="/submit" method="post">
      <!-- Violation 1: text input with no associated label — axe rule: label, WCAG 1.3.1 -->
      <div>
        <input type="text" name="name" placeholder="Your name">
      </div>

      <!-- Violation 2: email input with no associated label — axe rule: label, WCAG 1.3.1 -->
      <div>
        <input type="email" name="email" placeholder="Email address">
      </div>

      <!-- Violation 3: password input with no associated label — axe rule: label, WCAG 1.3.1 -->
      <div>
        <input type="password" name="password" placeholder="Password">
      </div>

      <button type="submit">Submit</button>
    </form>
  </main>
</body>
</html>
