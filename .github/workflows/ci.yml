name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        # Unit tests use mocked axe output — no Playwright or live browser needed.
        # The full auditor (run_axe) requires: uv run playwright install chromium --with-deps
        run: uv run pytest tests/unit/ -v
